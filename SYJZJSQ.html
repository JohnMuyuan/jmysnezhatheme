    document.body.appendChild(container);

    // ==========================================
    // 3. 核心抓取逻辑与数据缓存 (极致准确版)
    // ==========================================
    let exchangeRates = { CNY: 1, USD: 0.14, HKD: 1.08, EUR: 0.13, GBP: 0.11 }; 
    let isPremiumMode = false;

    const dom = {
        toast: document.getElementById('trade-calc-toast'), container: document.getElementById('tc-view-container'),
        mainTitle: document.getElementById('tc-main-title'), cartCount: document.getElementById('tc-cart-count'),
        cartItemsWrapper: document.getElementById('tc-cart-items-wrapper'), multiList: document.getElementById('tc-multi-list-container')
    };

    function showToast(msg) { dom.toast.textContent = msg; dom.toast.classList.add('show'); setTimeout(() => dom.toast.classList.remove('show'), 2500); }

    async function fetchRates() {
        try { const res = await fetch('https://open.er-api.com/v6/latest/CNY'); const data = await res.json(); if (data && data.rates) { exchangeRates = data.rates; document.getElementById('tc-ex-rate-hint').textContent = '(已应用实时汇率)'; calculateTrade(); } } catch (e) {}
    }

    function convertToCNY(val, cur) { if (!val || isNaN(val)) return 0; if (cur === 'CNY' || !exchangeRates[cur]) return parseFloat(val); return parseFloat(val) / exchangeRates[cur]; }
    function formatCur(val, cur) { const sym = {'CNY':'¥','USD':'$','HKD':'HK$','EUR':'€','GBP':'£'}; return `${sym[cur]||''} ${val.toFixed(2)}`; }

    // 最核心的解析逻辑
    function parseNodePriceLocal(text) {
        if (text.match(/价格:\s*(免费|Free|0|-1)/i)) return null;
        const normalMatch = text.match(/价格:\s*([^\/\n]+)(?:\s*\/\s*([^\s\n]+))?/);
        if (!normalMatch) return null;
        let priceStr = normalMatch[1].trim(), periodStr = normalMatch[2], period = 'month'; 
        if (periodStr) { if (periodStr.match(/年|yr|year/i)) period = 'year'; else if (periodStr.match(/季/)) period = 'quarter'; else if (periodStr.match(/半年/)) period = 'half-year'; } 
        else { if (text.match(/周期:\s*(一?年|年付)|年付/i)) period = 'year'; else if (text.match(/周期:\s*(一?季|季付)|季付/i)) period = 'quarter'; else if (text.match(/周期:\s*半年|半年付/i)) period = 'half-year'; }
        let symbol = 'CNY'; 
        if (priceStr.match(/\$|USD/i)) symbol = 'USD'; else if (priceStr.match(/HK\$|HKD/i)) symbol = 'HKD'; else if (priceStr.match(/€|EUR/i)) symbol = 'EUR'; else if (priceStr.match(/£|GBP/i)) symbol = 'GBP';
        const numMatch = priceStr.replace(/,/g, '').match(/[\d.]+/); return { value: numMatch ? parseFloat(numMatch[0]) : 0, symbol, period };
    }

    function fastScanDOM() {
        const cards = document.querySelectorAll('.rounded-lg.border.bg-card');
        let newCache = {}; 
        if (cards.length >= 3) {
            let index = 0;
            cards.forEach(card => {
                const fullText = card.textContent.trim();
                if (/^\s*(服务器总数|在线服务器|离线服务器|网络|Total Servers)/i.test(fullText) || fullText.includes('白嫖') || fullText.match(/价格:\s*(免费|Free|0|-1)/i)) return;
                const pd = parseNodePriceLocal(fullText); if (!pd || pd.value === 0) return;
                const nameEl = card.querySelector('p.font-bold, h2.font-bold, div.font-bold') || card.querySelector('p'); 
                let sName = '';
                if (nameEl) {
                     const clone = nameEl.cloneNode(true);
                    // 增加了对 .nz-stock-tag (库存标签) 的精准剔除
                    const extras = clone.querySelectorAll('.nz-custom-footer, .vps-value-tag, .nz-btns, .nz-stock-tag');
                    extras.forEach(el => el.remove());
                    // 终极暴力清理：把有货、无货等状态字眼也全部拉黑干掉
                    sName = clone.textContent.replace(/去抢购|去守候|已下架|测评|●\s*有货|○\s*无货|✖\s*已下架/g, '').trim();
                }
                if (!sName) return;

                let exp = ''; const daysMatch = fullText.match(/剩余天数:\s*(\d+)/);
                if (daysMatch) { const d = new Date(); d.setDate(d.getDate() + parseInt(daysMatch[1])); exp = d.toISOString().split('T')[0]; } 
                else if (fullText.match(/剩余天数:\s*永久/i)) { const d = new Date(); d.setFullYear(d.getFullYear() + 100); exp = d.toISOString().split('T')[0]; }
                let cycle = 30; if (pd.period === 'year') cycle = 365; else if (pd.period === 'half-year') cycle = 182.5; else if (pd.period === 'quarter') cycle = 90;

                // 提取旗帜作为区域
                const flagMatch = fullText.match(/[\uD83C][\uDDE6-\uDDFF][\uD83C][\uDDE6-\uDDFF]/);
                let regionFlag = flagMatch ? flagMatch[0] : '';

                // 全局提取路由词汇
                let rtTagsArray = [];
                const routingRegex = /(三网|骨干|CN2|9929|CMIN2|GIA|BGP|CMI|CU|CT|4837|优化|直连|专线|IPLC|IEPL|AGA)/ig;
                let match; while ((match = routingRegex.exec(fullText)) !== null) { const kw = match[0].toUpperCase(); if (!rtTagsArray.includes(kw)) rtTagsArray.push(kw); }
                let isLuodi = /落地/.test(fullText);

                let bw = "", tr = "", v4 = false, v6 = false, tags = [];
                card.querySelectorAll('*').forEach(el => {
                    if (el.children.length > 0) return; 
                    
                    // 【核心修复1】：划定“绝对隔离区”，直接无视你所有自定义插件生成的元素！
                    if (el.closest('.nz-custom-footer, .vps-value-tag, .nz-ping-board, .nz-stock-tag, .nz-btns')) return;

                    const txt = el.textContent.trim();
                    
                    // 【核心修复2】：双重保险，把测评、抢购、有无货等词汇加入正则表达式黑名单屏蔽
                    if (!txt || txt.length > 60 || /CPU|内存|存储|上传|下载|价格|剩余|天|在线|离线|\d+\.\d+%|\d+\.\d+K\/s|B\/s|去抢购|去守候|已下架|测评|有货|无货|每日成本/i.test(txt)) return;
                    
                    if (/^\d+(Mbps|Gbps|Kbps)$/i.test(txt)) bw = txt; 
                    else if (/^\d+(GB|TB|MB|PB)\/(Month|Mouth|mo)/i.test(txt)) tr = txt;
                    else if (/无限|不限/i.test(txt)) tr = "无限流量";
                    else if (/^IPv4$/i.test(txt)) v4 = true; 
                    else if (/^IPv6$/i.test(txt)) v6 = true;
                    else if (!txt.includes('修改') && !txt.includes('删除') && txt.length > 1) { 
                        // 排除提取到纯 Emoji 旗帜
                        if (!txt.match(/[\uD83C][\uDDE6-\uDDFF][\uD83C][\uDDE6-\uDDFF]/) && !tags.includes(txt)) {
                            tags.push(txt); 
                        }
                    }
                });

                // 取最后一个标签作为商家
                let mer = ""; if (tags.length > 0) mer = tags.pop();
                let rt = "无优化"; if (rtTagsArray.length > 0) rt = rtTagsArray.join(', ');
                if (isLuodi) rt = (rt === "无优化") ? "落地" : rt + " / 落地";

                newCache['srv_' + index] = { id: 'srv_'+index, name: sName, price: pd.value, currency: pd.symbol, cycle: cycle, expiry: exp, bandwidth: bw, traffic: tr, ipv4: v4, ipv6: v6, merchant: mer, routing: rt, region: regionFlag };
                index++;
            });
        }
        
        // 缓存策略：抓取成功则覆盖，否则尝试读取历史
        if (Object.keys(newCache).length > 0) { window.__TradeServerData = newCache; localStorage.setItem('TradeCalc_ServerData', JSON.stringify(newCache)); } 
        else { try { const saved = localStorage.getItem('TradeCalc_ServerData'); if (saved) window.__TradeServerData = JSON.parse(saved); } catch(e) {} }
    }

    const today = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
    document.getElementById('tc-trade-date').value = today.toISOString().split('T')[0];

    // ==========================================
    // 4. Tab 切换与价格计算
    // ==========================================
    document.getElementById('tc-tab-sell').addEventListener('click', () => { window.__CurrentMode = 'sell'; document.getElementById('tc-tab-sell').classList.add('active'); document.getElementById('tc-tab-buy').classList.remove('active'); document.getElementById('tc-section-sell').classList.remove('tc-hidden'); document.getElementById('tc-section-buy').classList.add('tc-hidden'); });
    document.getElementById('tc-tab-buy').addEventListener('click', () => { window.__CurrentMode = 'buy'; document.getElementById('tc-tab-buy').classList.add('active'); document.getElementById('tc-tab-sell').classList.remove('active'); document.getElementById('tc-section-buy').classList.remove('tc-hidden'); document.getElementById('tc-section-sell').classList.add('tc-hidden'); });

    function calcRemain(priceOrig, currency, cycleDays, expiryDateStr, tradeDateStr) {
        if (!expiryDateStr || !tradeDateStr || !priceOrig) return 0;
        let pCNY = convertToCNY(priceOrig, currency);
        const diffMs = new Date(expiryDateStr + 'T00:00:00+08:00') - new Date(tradeDateStr + 'T00:00:00+08:00');
        if (diffMs > 10 * 365 * 86400000) return pCNY;
        return diffMs > 0 ? (pCNY / cycleDays) * (diffMs / 86400000) : 0;
    }

    document.getElementById('tc-mode-toggle').addEventListener('click', (e) => {
        isPremiumMode = !isPremiumMode;
        const lbl = document.getElementById('tc-sell-label'), inp = document.getElementById('tc-sell-price');
        if (isPremiumMode) { lbl.innerHTML = '本台期望溢价 <span style="color:var(--red-11);">*</span>'; e.target.textContent = '切明盘'; inp.placeholder = '正数溢价/负折价'; } 
        else { lbl.innerHTML = '本台明盘价 <span style="color:var(--red-11);">*</span>'; e.target.textContent = '切溢价'; inp.placeholder = '输入出机售价'; }
        calculateTrade();
    });

    document.getElementById('tc-btn-sell-flat').addEventListener('click', () => {
        const remStr = document.getElementById('tc-res-remain').value.replace('¥ ', '');
        const remVal = parseFloat(remStr);
        if (!isNaN(remVal) && remVal > 0) {
            if (isPremiumMode) document.getElementById('tc-mode-toggle').click();
            document.getElementById('tc-sell-currency').value = 'CNY'; 
            document.getElementById('tc-sell-price').value = remVal.toFixed(2);
            calculateTrade();
        } else { showToast('⚠️ 请先完善原价和到期时间，算出剩余价值后再点击'); }
    });

    function calculateTrade() {
        if (window.__CurrentMode === 'buy') return;
        const pInp = parseFloat(document.getElementById('tc-price').value), cur = document.getElementById('tc-currency').value;
        const cyc = parseFloat(document.getElementById('tc-cycle').value), exp = document.getElementById('tc-expiry').value;
        const tDate = document.getElementById('tc-trade-date').value, sInp = parseFloat(document.getElementById('tc-sell-price').value), sCur = document.getElementById('tc-sell-currency').value;
        
        const eRem = document.getElementById('tc-res-remain'), eTot = document.getElementById('tc-res-total'), ePre = document.getElementById('tc-res-premium');
        if (isNaN(pInp) || !exp || !tDate) { eRem.value = '¥ 0.00'; eTot.value = '-'; ePre.value = '-'; ePre.className = 'trade-result-value'; return; }
        
        let remCNY = calcRemain(pInp, cur, cyc, exp, tDate); eRem.value = `¥ ${remCNY.toFixed(2)}`;

        if (!isNaN(sInp)) {
            let sellCNY = 0, premCNY = 0;
            if (isPremiumMode) { premCNY = convertToCNY(sInp, sCur); sellCNY = remCNY + premCNY; } 
            else { sellCNY = convertToCNY(sInp, sCur); premCNY = sellCNY - remCNY; }
            
            const rate = remCNY > 0 ? (premCNY / remCNY * 100).toFixed(2) : 0;
            eTot.value = `¥ ${sellCNY.toFixed(2)}`;
            let rateStr = premCNY === 0 ? "(平价出)" : `(${rate > 0 ? '+' : ''}${rate}%)`;
            ePre.value = `${premCNY > 0 ? '+' : ''}${premCNY.toFixed(2)} ${rateStr}`;
            ePre.className = `trade-result-value ${premCNY > 0 ? 'tc-text-profit' : (premCNY < 0 ? 'tc-text-loss' : '')}`;
        } else { eTot.value = '-'; ePre.value = '-'; ePre.className = 'trade-result-value'; }
    }

    ['tc-price', 'tc-currency', 'tc-cycle', 'tc-expiry', 'tc-trade-date', 'tc-sell-price', 'tc-sell-currency'].forEach(id => {
        document.getElementById(id).addEventListener('input', calculateTrade); document.getElementById(id).addEventListener('change', calculateTrade);
    });
    document.getElementById('tc-trade-date').addEventListener('change', () => { document.querySelectorAll('.tc-multi-item').forEach(el => updateCompPnL(el.id.replace('comp_wrap_',''))); });

    // ==========================================
    // 5. 伴生机独立计算
    // ==========================================
    function renderCompanionList() {
        dom.multiList.innerHTML = ''; const cached = window.__TradeServerData || {};
        for (const [id, data] of Object.entries(cached)) {
            const tDate = document.getElementById('tc-trade-date').value;
            const remCNY = calcRemain(data.price, data.currency, data.cycle, data.expiry, tDate);
            const html = `
                <div class="tc-multi-item" id="comp_wrap_${id}">
                    <label><input type="checkbox" class="tc-comp-cb" value="${id}"> ${data.name}</label>
                    <div class="tc-comp-pricing tc-hidden" id="comp_pricing_${id}">
                        <div style="display:flex; gap:6px; margin-bottom:6px;">
                            <select class="trade-select tc-comp-mode" style="width:65px; padding:6px;"><option value="price">售价</option><option value="prem">溢价</option></select>
                            <select class="trade-select tc-comp-cur" style="width:60px; padding:6px;"><option value="CNY">¥</option><option value="USD">$</option><option value="EUR">€</option></select>
                            <input type="number" class="trade-input tc-comp-val" style="flex:1; padding:6px;" placeholder="金额">
                            <button type="button" class="tc-comp-btn tc-comp-btn-flat">⚡剩价出</button>
                        </div>
                    </div>
                    <div style="font-size:0.8rem; color:var(--gray-11); padding-left:20px;">剩余: <span id="comp_rem_${id}">¥ ${remCNY.toFixed(2)}</span> | 折合明盘: <span id="comp_sell_${id}">-</span> | 盈亏: <span id="comp_pnl_${id}">-</span></div>
                </div>
            `;
            dom.multiList.insertAdjacentHTML('beforeend', html);
        }
        if (Object.keys(cached).length === 0) dom.multiList.innerHTML = '<div style="font-size:0.8rem;">暂无其他机器</div>';

        document.querySelectorAll('.tc-comp-cb').forEach(cb => { cb.addEventListener('change', (e) => { const id = e.target.value; const box = document.getElementById(`comp_pricing_${id}`); e.target.checked ? box.classList.remove('tc-hidden') : box.classList.add('tc-hidden'); updateCompPnL(id); }); });
        document.querySelectorAll('.tc-comp-val').forEach(inp => inp.addEventListener('input', (e) => updateCompPnL(e.target.closest('.tc-multi-item').id.replace('comp_wrap_',''))));
        document.querySelectorAll('.tc-comp-mode, .tc-comp-cur').forEach(sel => sel.addEventListener('change', (e) => updateCompPnL(e.target.closest('.tc-multi-item').id.replace('comp_wrap_',''))));
        document.querySelectorAll('.tc-comp-btn-flat').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.target.closest('.tc-multi-item').id.replace('comp_wrap_',''); const wrap = document.getElementById(`comp_wrap_${id}`);
                wrap.querySelector('.tc-comp-mode').value = 'prem'; wrap.querySelector('.tc-comp-cur').value = 'CNY'; wrap.querySelector('.tc-comp-val').value = 0; updateCompPnL(id);
            });
        });
    }

    function updateCompPnL(id) {
        const wrap = document.getElementById(`comp_wrap_${id}`); if(!wrap) return;
        const isChecked = wrap.querySelector('.tc-comp-cb').checked;
        const eRem = document.getElementById(`comp_rem_${id}`), eSell = document.getElementById(`comp_sell_${id}`), ePnl = document.getElementById(`comp_pnl_${id}`);
        const data = window.__TradeServerData[id]; const tDate = document.getElementById('tc-trade-date').value;
        const remCNY = calcRemain(data.price, data.currency, data.cycle, data.expiry, tDate); eRem.textContent = `¥ ${remCNY.toFixed(2)}`;
        
        // 【核心修改】：如果是主机器，隐藏价格框，提示“见上方”
        const mainId = document.getElementById('tc-server-select').value;
        if (id === mainId) {
            wrap.querySelector('.tc-comp-pricing').classList.add('tc-hidden');
            eSell.innerHTML = '<span style="color:var(--accent-11);font-weight:bold;">主机器(见上方)</span>';
            ePnl.textContent = '-'; ePnl.className = ''; return;
        }

        if (!isChecked) { eSell.textContent = '-'; ePnl.textContent = '-'; ePnl.className = ''; return; }

        const mode = wrap.querySelector('.tc-comp-mode').value, cur = wrap.querySelector('.tc-comp-cur').value, valInp = parseFloat(wrap.querySelector('.tc-comp-val').value);
        if (isNaN(valInp)) { eSell.textContent = '待填'; ePnl.textContent = '-'; ePnl.className = ''; return; }

        let sellCNY = 0, pnlCNY = 0; const valCNY = convertToCNY(valInp, cur);
        if (mode === 'prem') { pnlCNY = valCNY; sellCNY = remCNY + pnlCNY; } else { sellCNY = valCNY; pnlCNY = sellCNY - remCNY; }
        
        const rate = remCNY > 0 ? (pnlCNY / remCNY * 100).toFixed(2) : 0; eSell.textContent = `¥ ${sellCNY.toFixed(2)}`;
        let rStr = pnlCNY === 0 ? "(平价)" : `(${rate > 0 ? '+' : ''}${rate}%)`;
        ePnl.textContent = `${pnlCNY > 0 ? '+' : ''}${pnlCNY.toFixed(2)} ${rStr}`; ePnl.className = pnlCNY > 0 ? 'tc-text-profit' : (pnlCNY < 0 ? 'tc-text-loss' : '');
    }

    function populateDropdown() {
        const selectEl = document.getElementById('tc-server-select'); selectEl.innerHTML = '<option value="">-- 手动填或从探针选择 --</option>';
        const bQuickEl = document.getElementById('b_quick_import'); bQuickEl.innerHTML = '<option value="">-- 手动填或点此快捷选择 --</option>';
        
        const cached = window.__TradeServerData || {};

            bQuickEl.appendChild(new Option(`${data.name}`, data.name));

        bQuickEl.addEventListener('change', function() { if (this.value) { document.getElementById('b_mer').value = this.value; } });

        const cards = document.querySelectorAll('.rounded-lg.border.bg-card');
        if (cards.length < 3 || window.location.pathname.includes('/server/')) {
            const title = document.title || '', header = document.body.textContent.substring(0, 800) || '';
            for (const [id, data] of Object.entries(cached)) { if (title.includes(data.name) || header.includes(data.name)) { selectEl.value = id; selectEl.dispatchEvent(new Event('change')); break; } }
        }
    }

    function validateForm() {

            if (!document.getElementById('tc-price').value) return "请填写【购入原价】";
            if (!document.getElementById('tc-expiry').value) return "请选择【到期时间】";

    function getFormSnapshot() {
        const err = validateForm(); if (err) { showToast('⚠️ ' + err); return null; }
        
        if (window.__CurrentMode === 'buy') {
            const bVal = parseFloat(document.getElementById('b_budget').value), bCur = document.getElementById('b_cur').value;
            return {
                id: window.__TradeEditingId || 'cart_' + Date.now(), type: 'buy', isEdit: !!window.__TradeEditingId,
                mer: document.getElementById('b_mer').value.trim(), bVal, bCur,
                bIp: document.getElementById('b_ip').value, bUnl: document.getElementById('b_unlock').value, bTim: document.getElementById('b_time').value,
                bAcc: document.getElementById('b_acc').value, bMul: document.getElementById('b_multi').value, bNt: document.getElementById('b_nt').value,
                accSell: convertToCNY(bVal, bCur), accPrem: 0
            };
        } else {
            const tDate = document.getElementById('tc-trade-date').value;
            const mainRem = calcRemain(document.getElementById('tc-price').value, document.getElementById('tc-currency').value, document.getElementById('tc-cycle').value, document.getElementById('tc-expiry').value, tDate);
            const sInp = parseFloat(document.getElementById('tc-sell-price').value), sCur = document.getElementById('tc-sell-currency').value;
            let mainSell = 0, mainPrem = 0;
            if (isPremiumMode) { mainPrem = convertToCNY(sInp, sCur); mainSell = mainRem + mainPrem; } else { mainSell = convertToCNY(sInp, sCur); mainPrem = mainSell - mainRem; }

            let companions = []; let totalCompRem = 0, totalCompSell = 0, totalCompPrem = 0;
        if (document.getElementById('f_multi').checked) {
            document.querySelectorAll('.tc-comp-cb:checked').forEach(cb => {
                const id = cb.value; 
                // 【核心修改】：拦截主机器，防止它被当作伴生机重复计入总价
                if (id === document.getElementById('tc-server-select').value) return;

                const cData = window.__TradeServerData[id]; const wrap = document.getElementById(`comp_wrap_${id}`);
                const mode = wrap.querySelector('.tc-comp-mode').value, cur = wrap.querySelector('.tc-comp-cur').value, valInp = parseFloat(wrap.querySelector('.tc-comp-val').value) || 0;
                const cRem = calcRemain(cData.price, cData.currency, cData.cycle, cData.expiry, tDate);
                let cSell = 0, cPrem = 0; const valCNY = convertToCNY(valInp, cur);
                if (mode === 'prem') { cPrem = valCNY; cSell = cRem + cPrem; } else { cSell = valCNY; cPrem = cSell - cRem; }
                
                totalCompRem += cRem; totalCompSell += cSell; totalCompPrem += cPrem;
                const cycMap = {"365":"年付","182.5":"半年付","90":"季付","30":"月付"}; const cRate = cRem > 0 ? (cPrem / cRem * 100).toFixed(2) : 0;
                companions.push({ id, name: cData.name, cost: `${cData.price} ${cData.currency}/${cycMap[cData.cycle]}`, expiry: cData.expiry, rem: cRem, sell: cSell, prem: cPrem, rateStr: cPrem===0?"平价出":`溢价 ${cPrem>0?'+':''}${cPrem.toFixed(2)} (${cRate>0?'+':''}${cRate}%)`, rawMode: mode, rawCur: cur, rawVal: valInp });
            });
        }

            const cycMap = {"365":"年付","182.5":"半年付","90":"季付","30":"月付"};
            const mRate = mainRem > 0 ? (mainPrem / mainRem * 100).toFixed(2) : 0;
            return {
                id: window.__TradeEditingId || 'cart_' + Date.now(), type: 'sell', isEdit: !!window.__TradeEditingId,
                mer: document.getElementById('f_mer').value.trim(), reg: document.getElementById('f_reg').value || '未说明', bw: document.getElementById('f_bw').value || '未说明', tr: document.getElementById('f_tr').value || '未说明', rt: document.getElementById('f_rt').value || '未说明', tm: document.getElementById('f_tm').value || '未说明', nt: document.getElementById('f_nt').value,
                v4: document.getElementById('f_v4').checked, v6: document.getElementById('f_v6').checked, pp: document.getElementById('f_pp').checked, ppSafe: document.getElementById('f_pp_safe').checked, ali: document.getElementById('f_ali').checked,
                rawPrice: document.getElementById('tc-price').value, rawCur: document.getElementById('tc-currency').value, rawCyc: document.getElementById('tc-cycle').value, rawExp: document.getElementById('tc-expiry').value, rawSell: sInp, rawSellCur: sCur, rawPremiumMode: isPremiumMode,
                isMulti: document.getElementById('f_multi').checked, companions, pOrig: `${document.getElementById('tc-price').value} ${document.getElementById('tc-currency').value} / ${cycMap[document.getElementById('tc-cycle').value]}`, pExp: document.getElementById('tc-expiry').value,
                mainRem, mainSell, mainPrem, mainRateStr: mainPrem===0?"平价出":`溢价 ${mainPrem>0?'+':''}${mainPrem.toFixed(2)} (${mRate>0?'+':''}${mRate}%)`,
                accRem: mainRem + totalCompRem, accSell: mainSell + totalCompSell, accPrem: mainPrem + totalCompPrem
            };
        }
    }

    function renderCartView() {
        const wrap = dom.cartItemsWrapper; wrap.innerHTML = ''; dom.cartCount.textContent = window.__TradeCart.length;
        if (window.__TradeCart.length === 0) { wrap.innerHTML = '<div style="text-align:center; padding:40px; color:var(--gray-11);">暂存车为空<br><br>请在左侧表单配置并加入</div>'; document.querySelector('.tc-grand-total')?.remove(); return; }

        let grandTot = 0, grandPnl = 0; let hasSell = false;
        window.__TradeCart.forEach((item, idx) => {
            if (item.type === 'buy') {
                wrap.innerHTML += `
                    <div class="tc-cart-card">
                        <div class="tc-cart-card-header"><span>${idx+1}. <span class="tc-cart-badge-buy">收</span> ${item.mer}</span></div>

                    </div>`;
            } else {
                hasSell = true;
                grandTot += item.accSell; grandPnl += item.accPrem;
                const pClass = item.accPrem > 0 ? 'tc-text-profit' : (item.accPrem < 0 ? 'tc-text-loss' : '');
                const pText = item.accPrem > 0 ? '+' + item.accPrem.toFixed(2) : item.accPrem.toFixed(2);
                let compHtml = '';
                if (item.companions.length > 0) {

                    item.companions.forEach(c => { const cClass = c.prem > 0 ? 'tc-text-profit' : (c.prem < 0 ? 'tc-text-loss' : ''); compHtml += `<div class="tc-cart-detail">↳ ${c.name} : <span>明盘 ¥${c.sell.toFixed(2)} (<span class="${cClass}">${c.prem>0?'+':''}${c.prem.toFixed(2)}</span>)</span></div>`; });
                    compHtml += '</div>';
                }
                wrap.innerHTML += `
                    <div class="tc-cart-card">

                        <div class="tc-cart-detail">主机器盈亏: <span class="${item.mainPrem > 0 ? 'tc-text-profit' : (item.mainPrem < 0 ? 'tc-text-loss' : '')}">${item.mainPrem > 0 ? '+' : ''}${item.mainPrem.toFixed(2)}</span></div>
                        ${compHtml}
                        <div class="tc-cart-detail" style="margin-top:8px; font-weight:bold; color:var(--gray-12);">本单总明盘: <span>¥ ${item.accSell.toFixed(2)}</span></div>
                        <div class="tc-cart-detail" style="font-weight:bold; color:var(--gray-12);">本单总盈亏: <span class="${pClass}">${pText}</span></div>
                        <div class="tc-cart-actions"><button class="tc-action-btn edit" data-id="${item.id}">✏️ 编辑</button><button class="tc-action-btn del" data-id="${item.id}">🗑️ 移除</button></div>
                    </div>`;
            }
        });

        // 处理全局总结卡片
        const existingGrand = document.querySelector('.tc-grand-total');
        if (existingGrand) existingGrand.remove();

        if (hasSell) {
            const gClass = grandPnl > 0 ? 'profit' : (grandPnl < 0 ? 'loss' : '');
            const gColor = grandPnl > 0 ? 'tc-text-profit' : (grandPnl < 0 ? 'tc-text-loss' : '');
            wrap.insertAdjacentHTML('beforeend', `
                <div class="tc-grand-total ${gClass}">
                    <div class="tc-grand-row"><span>出机总明盘：</span><span>¥ ${grandTot.toFixed(2)}</span></div>
                    <div class="tc-grand-row"><span>出机总盈亏：</span><span class="${gColor}">${grandPnl > 0 ? '+' : ''}${grandPnl.toFixed(2)}</span></div>
                </div>
            `);
        }

        document.querySelectorAll('.tc-action-btn.del').forEach(b => b.addEventListener('click', (e) => { window.__TradeCart = window.__TradeCart.filter(i => i.id !== e.target.getAttribute('data-id')); renderCartView(); }));
        document.querySelectorAll('.tc-action-btn.edit').forEach(b => b.addEventListener('click', (e) => loadEdit(e.target.getAttribute('data-id'))));
    }

    function generateFinalPost(targetType) {
    // 1. 筛选当前要生成的类型
    let items = window.__TradeCart.filter(i => i.type === targetType);
    
    // 2. 自动存入逻辑：如果结算台空且表单有内容，尝试抓取
    if (items.length === 0) { 
        if (window.__CurrentMode === targetType && !validateForm()) {
            const snap = getFormSnapshot(); 
            if (snap) { 
                window.__TradeCart.push(snap); 
                items.push(snap); 
                renderCartView(); 
            }
        } else { 
            showToast(`⚠️ 暂存车中没有【${targetType === 'sell' ? '出' : '收'}机】内容`); 
            return; 
        }
    }
    
    let template = ''; 
    let titleParts = [];
    const g_contact = document.getElementById('f_g_contact').value.trim() || '站内私信 / PM';
    const g_note = document.getElementById('f_g_note').value.trim() || '支付宝口令红包或中介交易，中介费自理';

    if (targetType === 'sell') {
        // ================= 【出机帖】核心逻辑 =================
        let grandTot = 0, grandPnl = 0, bodyBlocks = "";
        
        items.forEach((acc, idx) => {
            grandTot += acc.accSell; 
            grandPnl += acc.accPrem; 
            
            // 拼接单笔账号的身份：商家名+机器 [续费价格/周期]
            let currentTitlePart = `${acc.mer} [${acc.pOrig}]`;
            
            // 如果有伴生机，标题里也带上伴生机的身份
            if (acc.isMulti && acc.companions.length > 0) {
                let compTitles = acc.companions.map(c => `${c.name} [${c.cost}]`);
                currentTitlePart += ' + ' + compTitles.join(' + ');
            }
            titleParts.push(currentTitlePart);
            
            // 基础详情排版
            let ipStr = []; if(acc.v4) ipStr.push('IPv4'); if(acc.v6) ipStr.push('IPv6'); const ipFinal = ipStr.length > 0 ? ipStr.join('/') : '未说明';
            let payStr = []; if(acc.ali) payStr.push('支付宝'); if(acc.pp) payStr.push(`PayPal${acc.ppSafe ? '(已超半年防争议)' : ''}`); let payFinal = payStr.length > 0 ? ` (购入: ${payStr.join('/')})` : '';
            let ntStr = acc.nt ? `\n- 其他说明：${acc.nt}` : '';

            // 详情块
            bodyBlocks += `### ${idx+1}. 账号主体：${acc.mer}\n**【基本参数】**\n- 节点配置：${acc.reg} | ${acc.bw} | ${acc.tr} | ${acc.rt}\n- IP 支持：${ipFinal}\n- 购入成本：${acc.pOrig} (到期: ${acc.pExp})\n\n**【独立账单】**\n- 剩余价值：￥${acc.mainRem.toFixed(2)}\n- 本机明盘：**￥${acc.mainSell.toFixed(2)}** (${acc.mainRateStr})\n`;
            
            if (acc.isMulti && acc.companions.length > 0) {
                bodyBlocks += `\n**【同号伴生机】**\n`;
                acc.companions.forEach((c, cIdx) => { 
                    bodyBlocks += `- 附加机 ${cIdx+1}：${c.name}\n  续费：${c.cost} | 到期：${c.expiry} | 剩余价值：￥${c.rem.toFixed(2)}\n  本机明盘：**￥${c.sell.toFixed(2)}** (${c.rateStr})\n`; 
                });
            }
            bodyBlocks += `\n**【本账号汇总】**\n`;
            if (acc.isMulti) bodyBlocks += `- 账号总剩余：￥${acc.accRem.toFixed(2)}\n`;
            bodyBlocks += `- 账号总明盘：**￥${acc.accSell.toFixed(2)}** (账号总盈亏 ${acc.accPrem > 0 ? '+' : ''}${acc.accPrem.toFixed(2)})\n- 交易方式：${acc.tm}${payFinal}${ntStr}\n\n---\n\n`;
        });

        // 全局盈亏摘要
        let grandRate = (grandTot - grandPnl > 0) ? (grandPnl / (grandTot - grandPnl) * 100).toFixed(2) : 0;
        let rateStr = grandPnl === 0 ? "平价" : `溢价 ${grandPnl > 0 ? '+' : ''}${grandPnl.toFixed(2)}, ${grandRate > 0 ? '+' : ''}${grandRate}%`;
        
        // 【核心修改点】：标题包含 总出价
        template = `【出】${titleParts.join(' + ')} | 总出价 ￥${grandTot.toFixed(2)} (${rateStr})\n\n` + bodyBlocks;
        
        if (items.length > 1) {
            template += `**全部打包价格：** **￥${grandTot.toFixed(2)}** (${rateStr})\n\n`;
        }
        
    } else {
        // ================= 【收机帖】核心逻辑 =================
        let buyBlocks = "";
        let totalBudget = 0;
        
        items.forEach((b, idx) => {
            totalBudget += b.accSell; // accSell 在 Snapshot 里存的是预算的 CNY 数值
            titleParts.push(`${b.mer}`);
            let ntStr = b.bNt ? `\n- 备注说明：${b.bNt}` : '';
            buyBlocks += `### ${idx+1}. 求购：${b.mer}\n- **我的预算**：**${formatCur(b.bVal, b.bCur)}**\n- **线路/IP**：${b.bIp}\n- **解锁要求**：${b.bUnl || '无特殊要求'}\n- **到期要求**：${b.bTim || '无特殊要求'}\n- **交易方式**：${b.bAcc}\n- **多机接受度**：${b.bMul}${ntStr}\n\n---\n\n`;
        });
        
        // 收机标题：包含总预算
        template = `【收】${titleParts.join(' + ')} | 总预算 ￥${totalBudget.toFixed(2)}\n\n` + buyBlocks;
    }

    const finalMd = template + `**联系方式：** ${g_contact}\n**交易声明：** ${g_note}`;
    
    document.getElementById('tc-post-content').value = finalMd;
    dom.container.style.transform = 'translateX(-66.666%)'; 
    dom.mainTitle.textContent = '预览与修改';
}

        navigator.clipboard.writeText(document.getElementById('tc-post-content').value).then(() => {
            showToast(`✅ 完美！帖子内容已复制！`);
        }).catch(err => { showToast('❌ 复制失败，请手动全选复制'); });
    });

    // ==========================================
    // 8. 启停控制 (仅扫描一次并持久化)
    // ==========================================
    const ball = document.getElementById('trade-calc-ball'), overlay = document.getElementById('trade-calc-overlay'), modal = document.getElementById('trade-calc-modal'), closeBtn = document.getElementById('trade-calc-close');
    ball.addEventListener('click', () => { fastScanDOM(); populateDropdown(); renderCartView(); overlay.classList.add('show'); requestAnimationFrame(() => modal.style.transform = 'scale(1)'); });
    function closeModal() { overlay.classList.remove('show'); modal.style.transform = 'scale(0.95)'; setTimeout(() => { dom.container.style.transform = 'translateX(0)'; dom.mainTitle.textContent = '交易与发帖助手'; }, 300); }
    closeBtn.addEventListener('click', closeModal); overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
    
    // 初始化时静默抓取一次存入缓存
    setTimeout(fastScanDOM, 1000);

})();
</script>
